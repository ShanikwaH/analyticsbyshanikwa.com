<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{{subject}}</title>
<style>
  body{margin:0;padding:0;background:#f5f5f5;font-family:Georgia,serif;}
  .wrap{max-width:600px;margin:32px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .header{background:#1e293b;padding:28px 36px;}
  .header-brand{color:#94a3b8;font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .header-title{color:#fff;font-size:22px;font-weight:700;line-height:1.3;margin:0;}
  .badge{display:inline-block;background:#3b82f6;color:#fff;font-family:system-ui,sans-serif;font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;margin-top:10px;}
  .body{padding:32px 36px;}
  .scripture{border-left:3px solid #3b82f6;padding:12px 18px;margin:24px 0;color:#334155;font-style:italic;font-size:17px;line-height:1.6;}
  .scripture-ref{font-style:normal;font-size:13px;color:#64748b;margin-top:6px;}
  p{color:#334155;font-size:16px;line-height:1.75;margin:0 0 18px;}
  h2{color:#0f172a;font-size:19px;margin:28px 0 12px;}
  .takeaway{background:#f8fafc;border-radius:6px;padding:16px 20px;margin:8px 0;}
  .takeaway-check{color:#3b82f6;font-weight:700;margin-right:8px;}
  .cta-block{text-align:center;padding:28px 0 8px;}
  .cta-btn{display:inline-block;background:#3b82f6;color:#fff;text-decoration:none;font-family:system-ui,sans-serif;font-weight:600;font-size:15px;padding:13px 28px;border-radius:6px;}
  .footer{background:#f8fafc;padding:24px 36px;border-top:1px solid #e2e8f0;}
  .footer p{color:#94a3b8;font-family:system-ui,sans-serif;font-size:12px;margin:4px 0;}
  .footer a{color:#64748b;}
  @media(max-width:640px){.body,.header,.footer{padding:20px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-brand">Analytics by Shanikwa · Weekly Letter</div>
    <div class="header-title">{{title}}</div>
    <div class="badge">{{series}}</div>
  </div>
  <div class="body">
    <div class="scripture">
      "{{scripture_text}}"
      <div class="scripture-ref">— {{scripture_ref}}</div>
    </div>

    {{body_html}}

    <div class="cta-block">
      <a class="cta-btn" href="{{story_url}}">Read the full story →</a>
    </div>
  </div>
  <div class="footer">
    <p>You're receiving this because you subscribed at <a href="https://analyticsbyshanikwa.com">analyticsbyshanikwa.com</a></p>
    <p><a href="{{unsubscribe_url}}">Unsubscribe</a> · <a href="https://analyticsbyshanikwa.com">Visit the site</a></p>
  </div>
</div>
</body>
</html>
