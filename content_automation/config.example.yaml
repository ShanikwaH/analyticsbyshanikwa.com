# Analytics by Shanikwa — Content Automation Config
# 1. Copy this file to config.yaml (same folder)
# 2. Fill in your keys (run setup_wizard.py for step-by-step help)
# 3. NEVER commit config.yaml — it contains secrets

# ── AI Caption Generator ──────────────────────────────────────────────────────
# Pick ONE provider block and delete (or comment out) the others.

# --- Option A: Anthropic Claude (recommended — best writing quality) ----------
ai:
  provider: anthropic
  api_key: "sk-ant-REPLACE_ME"             # console.anthropic.com → API Keys
  model: "claude-haiku-4-5-20251001"       # fast + cheap; swap to claude-sonnet-4-6 for best quality

# --- Option B: OpenAI ----------------------------------------------------------
# ai:
#   provider: openai
#   api_key: "sk-REPLACE_ME"              # platform.openai.com → API Keys
#   model: "gpt-4o-mini"                  # or gpt-4o, o1-mini

# --- Option C: Google Gemini ---------------------------------------------------
# ai:
#   provider: google
#   api_key: "REPLACE_ME"                 # aistudio.google.com → Get API Key
#   model: "gemini-1.5-flash"             # or gemini-1.5-pro

# --- Option D: OpenRouter (200+ models, one key) ------------------------------
# ai:
#   provider: openrouter
#   api_key: "sk-or-REPLACE_ME"           # openrouter.ai → Keys
#   model: "openai/gpt-4o-mini"           # or anthropic/claude-3-haiku, meta-llama/llama-3-8b

# --- Option E: Groq (free tier, very fast) ------------------------------------
# ai:
#   provider: groq
#   api_key: "gsk_REPLACE_ME"             # console.groq.com → API Keys
#   model: "llama3-8b-8192"               # or mixtral-8x7b-32768, gemma-7b-it

# --- Option F: Together AI (open-source models) --------------------------------
# ai:
#   provider: together
#   api_key: "REPLACE_ME"                 # api.together.ai → Settings → API Keys
#   model: "meta-llama/Llama-3-8b-chat-hf"

# --- Option G: Ollama (100% local, no cost, no internet) ----------------------
# ai:
#   provider: ollama
#   api_key: "ollama"                      # any non-empty string; Ollama ignores it
#   model: "llama3"                        # must be pulled: ollama pull llama3

# --- Option H: Any other OpenAI-compatible API --------------------------------
# ai:
#   provider: custom
#   api_key: "REPLACE_ME"
#   base_url: "https://your-provider.com/v1"
#   model: "model-name"

# ── YouTube ──────────────────────────────────────────────────────────────────
youtube:
  client_secrets_file: "youtube_secrets.json"  # download from Google Cloud Console

# ── TikTok ───────────────────────────────────────────────────────────────────
tiktok:
  client_key: "REPLACE_ME"              # TikTok Developer Portal → app
  client_secret: "REPLACE_ME"
  access_token: "REPLACE_ME"            # run setup_wizard.py to get this

# ── Pinterest ─────────────────────────────────────────────────────────────────
pinterest:
  access_token: "REPLACE_ME"            # run setup_wizard.py to get this
  board_id: "REPLACE_ME"                # found in your board URL

# ── Email Newsletter ──────────────────────────────────────────────────────────
# Pick ONE provider block and delete (or comment out) the others.

# --- Option A: Gmail / any SMTP server (simplest to start) -------------------
email:
  provider: smtp
  smtp_preset: gmail                    # gmail | outlook | yahoo | icloud | office365
  username: "REPLACE_ME@gmail.com"
  password: "REPLACE_ME"               # Gmail App Password (not your regular password)
  from_email: "REPLACE_ME@gmail.com"
  to_addresses:                         # manual list — add all your subscriber emails
    - "subscriber1@email.com"
    - "subscriber2@email.com"

# --- Option B: ConvertKit / Kit (recommended for newsletter creators) ---------
# email:
#   provider: convertkit
#   api_key: "REPLACE_ME"              # app.kit.com → Settings → API
#   api_secret: "REPLACE_ME"

