# ── Defaults ─────────────────────────────────────────────────────────────────
defaults:
  from_name: "Analytics by Shanikwa"
  youtube_category_id: "26"             # 26 = How-to & Style
  youtube_privacy: "public"             # public | unlisted | private
  post_to:
    - youtube
    - tiktok
    - pinterest
    - email
